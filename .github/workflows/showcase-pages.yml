# Publishes website/ to GitHub Pages.
#
# ONE-TIME (required or configure-pages fails with "Get Pages site failed" / 404):
# 1. Open: https://github.com/<owner>/<repo>/settings/pages
# 2. Under "Build and deployment", set Source to "GitHub Actions" (NOT "Deploy from a branch").
# 3. Save if prompted, then re-run this workflow (Actions → failed run → Re-run jobs).
#
# Note: actions/configure-pages cannot enable Pages using GITHUB_TOKEN alone; you must set
# Source to GitHub Actions in the UI once. See:
# https://docs.github.com/en/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site#publishing-with-a-custom-github-actions-workflow

name: Showcase site (GitHub Pages)

on:
  push:
    branches: [master, main]
    paths:
      - "website/**"
      - ".github/workflows/showcase-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-showcase
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website
      - id: deployment
        uses: actions/deploy-pages@v4
